<h2>Orientation du diagramme arborescent</h2>
<p class="subtitle">Lequel correspond à ce que vous imaginez ?</p>

<div class="options">

  <div class="option" data-choice="top-down" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Haut → Bas (comme l'exemple)</h3>
      <p>Company en haut, Pays en dessous, Actifs encore dessous, Commodités en bas (feuilles)</p>
      <div style="margin-top:14px">
        <svg viewBox="0 0 400 260" width="380" height="240" style="display:block;font-family:Inter,sans-serif">
          <!-- Company root -->
          <rect x="140" y="10" width="120" height="36" rx="5" fill="#91452d"/>
          <text x="200" y="32" text-anchor="middle" font-size="11" fill="white" font-weight="600">ACME Corp</text>
          <text x="200" y="44" text-anchor="middle" font-size="9" fill="#ffd4c5">100 %</text>

          <!-- Lines from company to countries -->
          <line x1="200" y1="46" x2="90" y2="86" stroke="#ccc" stroke-width="1.5"/>
          <line x1="200" y1="46" x2="310" y2="86" stroke="#ccc" stroke-width="1.5"/>

          <!-- Countries -->
          <rect x="30" y="86" width="120" height="34" rx="5" fill="#865220"/>
          <text x="90" y="107" text-anchor="middle" font-size="11" fill="white" font-weight="600">France</text>
          <text x="90" y="118" text-anchor="middle" font-size="9" fill="#ffe0c0">62 %</text>

          <rect x="250" y="86" width="120" height="34" rx="5" fill="#865220"/>
          <text x="310" y="107" text-anchor="middle" font-size="11" fill="white" font-weight="600">Brésil</text>
          <text x="310" y="118" text-anchor="middle" font-size="9" fill="#ffe0c0">38 %</text>

          <!-- Lines France → Assets -->
          <line x1="90" y1="120" x2="60" y2="160" stroke="#ccc" stroke-width="1.5"/>
          <line x1="90" y1="120" x2="130" y2="160" stroke="#ccc" stroke-width="1.5"/>

          <!-- Lines Brésil → Assets -->
          <line x1="310" y1="120" x2="310" y2="160" stroke="#ccc" stroke-width="1.5"/>

          <!-- Assets -->
          <rect x="10" y="160" width="90" height="30" rx="4" fill="#625a4e"/>
          <text x="55" y="179" text-anchor="middle" font-size="10" fill="white">Usine Lyon</text>

          <rect x="110" y="160" width="90" height="30" rx="4" fill="#625a4e"/>
          <text x="155" y="179" text-anchor="middle" font-size="10" fill="white">Port Brest</text>

          <rect x="260" y="160" width="100" height="30" rx="4" fill="#625a4e"/>
          <text x="310" y="179" text-anchor="middle" font-size="10" fill="white">Mine São Paulo</text>

          <!-- Lines to commodities -->
          <line x1="55" y1="190" x2="40" y2="225" stroke="#ccc" stroke-width="1"/>
          <line x1="55" y1="190" x2="80" y2="225" stroke="#ccc" stroke-width="1"/>
          <line x1="155" y1="190" x2="155" y2="225" stroke="#ccc" stroke-width="1"/>
          <line x1="310" y1="190" x2="310" y2="225" stroke="#ccc" stroke-width="1"/>

          <!-- Commodities -->
          <rect x="8" y="225" width="65" height="24" rx="3" fill="#4a7a5c"/>
          <text x="40" y="241" text-anchor="middle" font-size="9" fill="white">Soja</text>

          <rect x="52" y="225" width="65" height="24" rx="3" fill="#4a7a5c"/>
          <text x="80" y="241" text-anchor="middle" font-size="9" fill="white">Blé</text>

          <rect x="120" y="225" width="70" height="24" rx="3" fill="#4a7a5c"/>
          <text x="155" y="241" text-anchor="middle" font-size="9" fill="white">Bois</text>

          <rect x="272" y="225" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="310" y="241" text-anchor="middle" font-size="9" fill="white">Cuivre</text>
        </svg>
      </div>
    </div>
  </div>

  <div class="option" data-choice="left-right" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Gauche → Droite</h3>
      <p>Commodités à gauche (feuilles), Actifs, Pays, puis Company à droite (racine)</p>
      <div style="margin-top:14px">
        <svg viewBox="0 0 420 240" width="380" height="220" style="display:block;font-family:Inter,sans-serif">
          <!-- Commodities (left) -->
          <rect x="5" y="10" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="42" y="26" text-anchor="middle" font-size="9" fill="white">Soja</text>

          <rect x="5" y="42" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="42" y="58" text-anchor="middle" font-size="9" fill="white">Blé</text>

          <rect x="5" y="90" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="42" y="106" text-anchor="middle" font-size="9" fill="white">Bois</text>

          <rect x="5" y="138" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="42" y="154" text-anchor="middle" font-size="9" fill="white">Coton</text>

          <rect x="5" y="170" width="75" height="24" rx="3" fill="#4a7a5c"/>
          <text x="42" y="186" text-anchor="middle" font-size="9" fill="white">Cuivre</text>

          <!-- Lines to assets -->
          <line x1="80" y1="22" x2="110" y2="62" stroke="#ccc" stroke-width="1.2"/>
          <line x1="80" y1="54" x2="110" y2="62" stroke="#ccc" stroke-width="1.2"/>
          <line x1="80" y1="102" x2="110" y2="130" stroke="#ccc" stroke-width="1.2"/>
          <line x1="80" y1="150" x2="110" y2="130" stroke="#ccc" stroke-width="1.2"/>
          <line x1="80" y1="182" x2="110" y2="182" stroke="#ccc" stroke-width="1.2"/>

          <!-- Assets -->
          <rect x="110" y="48" width="90" height="28" rx="4" fill="#625a4e"/>
          <text x="155" y="66" text-anchor="middle" font-size="10" fill="white">Usine Lyon</text>

          <rect x="110" y="116" width="90" height="28" rx="4" fill="#625a4e"/>
          <text x="155" y="134" text-anchor="middle" font-size="10" fill="white">Port Brest</text>

          <rect x="110" y="168" width="90" height="28" rx="4" fill="#625a4e"/>
          <text x="155" y="186" text-anchor="middle" font-size="10" fill="white">Mine SP</text>

          <!-- Lines to countries -->
          <line x1="200" y1="62" x2="230" y2="92" stroke="#ccc" stroke-width="1.5"/>
          <line x1="200" y1="130" x2="230" y2="92" stroke="#ccc" stroke-width="1.5"/>
          <line x1="200" y1="182" x2="230" y2="168" stroke="#ccc" stroke-width="1.5"/>

          <!-- Countries -->
          <rect x="230" y="74" width="90" height="34" rx="5" fill="#865220"/>
          <text x="275" y="93" text-anchor="middle" font-size="11" fill="white" font-weight="600">France</text>
          <text x="275" y="105" text-anchor="middle" font-size="9" fill="#ffe0c0">62 %</text>

          <rect x="230" y="152" width="90" height="34" rx="5" fill="#865220"/>
          <text x="275" y="171" text-anchor="middle" font-size="11" fill="white" font-weight="600">Brésil</text>
          <text x="275" y="183" text-anchor="middle" font-size="9" fill="#ffe0c0">38 %</text>

          <!-- Lines to company -->
          <line x1="320" y1="91" x2="350" y2="120" stroke="#ccc" stroke-width="1.5"/>
          <line x1="320" y1="169" x2="350" y2="120" stroke="#ccc" stroke-width="1.5"/>

          <!-- Company (root, right) -->
          <rect x="350" y="100" width="65" height="40" rx="5" fill="#91452d"/>
          <text x="382" y="119" text-anchor="middle" font-size="10" fill="white" font-weight="600">ACME</text>
          <text x="382" y="132" text-anchor="middle" font-size="9" fill="#ffd4c5">100 %</text>
        </svg>
      </div>
    </div>
  </div>

</div>
